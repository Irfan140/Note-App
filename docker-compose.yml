services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: noteflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data

  ai-service:
    build:
      context: ./ai-service
    env_file:
      - ./ai-service/.env.development
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app
    command: uvicorn src.main:app --reload --host 0.0.0.0 --port 8000

  api:
    build:  
      context: ./api
    env_file:
      - ./api/.env.development
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app
      - /app/node_modules # this protects container dependencies.
    command: sh -c "bun install && bunx nodemon -L --exec bun src/index.ts"
    depends_on:
      - db
      - ai-service

  prisma-studio:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - ./api:/app
      - /app/node_modules
    command: sh -c "bun install && bunx prisma studio --browser none --hostname 0.0.0.0 --port 5555"
    ports:
      - "5555:5555"
    depends_on:
      - db

volumes:
  db_data: