services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: noteapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data

  ai:
    build:
      context: ./python-server
    env_file:
      - ./python-server/.env
    ports:
      - "8000:8000"

  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - db
      - ai

volumes:
  db_data: